name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.25"

      - name: Build Skopeo
        id: build_skopeo
        run: |
          APP=skopeo
          APP_REPO="https://github.com/containers/skopeo.git"
          APP_VERSION=$(curl -s https://api.github.com/repos/containers/skopeo/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Time=$(date "+%Y.%m.%d_%H%M%S")" >> $GITHUB_ENV

          echo "✅ 编译版本：${APP_VERSION}"
          if [[ -n "${APP_VERSION}" ]]; then
            echo "✅ 拉取仓库：${APP_REPO}"
            git clone -q --depth=1 --branch $APP_VERSION $APP_REPO
            cd ${APP}

            for os in linux darwin; do
              for arch in amd64 arm64; do
                if [[ "$os" == "linux" ]]; then
                  ldflags="-s -w"
                else
                  ldflags=""
                fi
                echo "📦 编译 $os-$arch"
                CGO_ENABLED=0 && GO111MODULE=on && GOOS=$os && GOARCH=$arch && go build -o ./bin/skopeo-$os-$arch ./cmd/skopeo
                md5sum ./bin/skopeo-$os-$arch > ./bin/skopeo-$os-$arch.md5
                sha256sum ./bin/skopeo-$os-$arch > ./bin/skopeo-$os-$arch.sha256
              done
            done            
            cd -
            
            # 创建校验和文件
            cat ./skopeo/bin/skopeo-{darwin,linux}-{amd64,arm64}.{md5,sha256} > CHECKSUMS.txt
           
            # 设置输出变量
            echo "ADD_TAG=${APP_VERSION}" >> $GITHUB_ENV
            if [ -d "./skopeo/bin" ] && [ "$(ls -A ./skopeo/bin)" ]; then
              echo "✅ 编译成功"
              echo "status=success" >> $GITHUB_OUTPUT
            fi
          else
            echo "❌ 未获取到版本号"
          fi

      - name: Upload as release assets
        if: (steps.build_skopeo.outputs.status == 'success')
        uses: ncipollo/release-action@main
        with:
          tag: GitHub-Actions_${{ env.ADD_TAG }}
          name: ${{ inputs.package }}
          artifacts: ./skopeo/bin/*
          body: |
            ## 编译信息
            - 编译时间：`${{ env.Time }}`
            - 版本：`${{ env.ADD_TAG }}`
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
