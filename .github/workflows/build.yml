name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.25"

      - name: Build Skopeo
        id: build_skopeo
        run: |
          set -eux
          APP=skopeo
          APP_REPO="https://github.com/containers/skopeo.git"
          APP_VERSION=$(curl -s https://api.github.com/repos/containers/skopeo/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Time=$(date "+%Y.%m.%d_%H%M%S")" >> $GITHUB_ENV

          echo "вң… зј–иҜ‘зүҲжң¬пјҡ${APP_VERSION}"
          if [[ -n "${APP_VERSION}" ]]; then
            echo "вң… жӢүеҸ–д»“еә“пјҡ${APP_REPO}"
            git clone -q --depth=1 --branch $APP_VERSION $APP_REPO
            cd ${APP}

            for os in linux darwin; do
              for arch in amd64 arm64; do
                if [[ "$os" == "linux" ]]; then
                  ldflags="-s -w"
                else
                  ldflags=""
                fi
                echo "рҹ“Ұ зј–иҜ‘ $os-$arch"
                CGO_ENABLED=0 GO111MODULE=on GOOS=$os GOARCH=$arch go build -ldflags "$ldflags" -o ./bin/skopeo-$os-$arch ./cmd/skopeo
                md5sum ./bin/skopeo-$os-$arch > ./bin/skopeo-$os-$arch.md5
                sha256sum ./bin/skopeo-$os-$arch > ./bin/skopeo-$os-$arch.sha256
              done
            done            
            cd -
            
            # еҲӣе»әж ЎйӘҢе’Ңж–Үд»¶
            cat ./skopeo/bin/skopeo-{darwin,linux}-{amd64,arm64}.{md5,sha256} > CHECKSUMS.txt
            cat ./skopeo/bin/skopeo-linux-ppc64le.{md5,sha256} >> CHECKSUMS.txt
            
            # и®ҫзҪ®иҫ“еҮәеҸҳйҮҸ
            echo "ADD_TAG=${APP_VERSION}" >> $GITHUB_ENV
            if [ -d "./skopeo/bin" ] && [ "$(ls -A ./skopeo/bin)" ]; then
              echo "вң… зј–иҜ‘жҲҗеҠҹ"
              echo "status=success" >> $GITHUB_OUTPUT
            fi
          else
            echo "вқҢ жңӘиҺ·еҸ–еҲ°зүҲжң¬еҸ·"
          fi

      - name: Upload as release assets
        if: (steps.build_skopeo.outputs.status == 'success')
        uses: ncipollo/release-action@main
        with:
          tag: GitHub-Actions_${{ env.ADD_TAG }}
          name: ${{ inputs.package }}
          artifacts: ./skopeo/bin/*
          body: |
            ## зј–иҜ‘дҝЎжҒҜ
            - зј–иҜ‘ж—¶й—ҙпјҡ`${{ env.Time }}`
            - зүҲжң¬пјҡ`${{ env.ADD_TAG }}`
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
