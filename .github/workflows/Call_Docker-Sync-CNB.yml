name: Call Docker Sync CNB

on:
  workflow_call:
    inputs:
      image:
        type: string
      platform:
        type: string

env:
  TZ: Asia/Shanghai

jobs:
  jobs_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Handle Variables
        run: |
          INPUT="${{ inputs.image }}"
          if [[ "$INPUT" == *":"* ]]; then
            IMAGE_NAME="${INPUT%%:*}"
            IMAGE_TAG="${INPUT##*:}"
          else
            IMAGE_NAME="$INPUT"
            IMAGE_TAG="latest"
          fi
          echo "name=$(basename $IMAGE_NAME | tr 'A-Z' 'a-z')" >> $GITHUB_ENV
          echo "image_name=$IMAGE_NAME" >> $GITHUB_ENV
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to CNB
        run: |
          docker login -u cnb -p ${{ secrets.CNB_TOKEN }} docker.cnb.cool

      - name: Check if sync needed
        id: check
        env:
          CNB_REPO: docker.cnb.cool/3wlh/docker-repo/${{ env.name }}
          DOCKERHUB_REPO: ${{ env.image_name }}
          IMAGE_TAG: ${{ env.image_tag }}
        run: |
          echo "✅ 检查镜像是否需要同步..."

          SOURCE_MANIFEST=$(docker buildx imagetools inspect ${DOCKERHUB_REPO}:${IMAGE_TAG} --raw 2>&1) || {
            echo "❌ 获取源镜像 manifest 失败"
            exit 1
          }
          TARGET_MANIFEST=$(docker buildx imagetools inspect ${CNB_REPO}:${IMAGE_TAG} --raw 2>&1) || true

          NEED_SYNC=false

          if [ "${{ inputs.platform }}" = "all" ]; then
            echo "✅ 检查所有架构..."
            SOURCE_DIGEST=$(echo "$SOURCE_MANIFEST" | sha256sum | cut -d' ' -f1)
            TARGET_DIGEST=$(echo "$TARGET_MANIFEST" | sha256sum | cut -d' ' -f1)
            echo "✅ 源 manifest hash: ${SOURCE_DIGEST}"
            echo "✅ 目标 manifest hash: ${TARGET_DIGEST:-不存在}"
            
            if [ "$SOURCE_DIGEST" != "$TARGET_DIGEST" ]; then
              NEED_SYNC=true
            fi
          else
            for ARCH in $(echo "${{ inputs.platform }}" | tr ',' ' '); do
              ARCH_NAME=$(echo $ARCH | cut -d'/' -f2)
              echo "✅ 检查架构: $ARCH_NAME"
              
              SOURCE_ARCH_DIGEST=$(echo "$SOURCE_MANIFEST" | jq -r --arg arch "$ARCH_NAME" '.manifests[] | select(.platform.architecture==$arch and .platform.os=="linux") | .digest' | head -1)
              TARGET_ARCH_DIGEST=$(echo "$TARGET_MANIFEST" | jq -r --arg arch "$ARCH_NAME" '.manifests[] | select(.platform.architecture==$arch and .platform.os=="linux") | .digest' | head -1)
              
              echo "❌ 源 $ARCH_NAME digest: ${SOURCE_ARCH_DIGEST:-不存在}"
              echo "⚠️ 目标 $ARCH_NAME digest: ${TARGET_ARCH_DIGEST:-不存在}"
              
              if [ -z "$SOURCE_ARCH_DIGEST" ]; then
                echo "⚠️ 警告：源镜像不存在 $ARCH_NAME 架构"
              elif [ "$SOURCE_ARCH_DIGEST" != "$TARGET_ARCH_DIGEST" ]; then
                NEED_SYNC=true
                echo "✅ 架构 $ARCH_NAME 需要同步"
              fi
            done
          fi

          if [ "$NEED_SYNC" = true ]; then
            echo "✅ 需要同步镜像"
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "✅ 镜像已存在且相同，跳过同步"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Mirror acceleration images
        run: |
          IMAGE=${{ env.image_name }}
          MIRROR_PREFIX="mirror.ccs.tencentyun.com"
          if echo "$IMAGE" | grep -q "^docker.io/"; then
              MIRROR_IMAGE=$(echo "$IMAGE" | sed "s|^docker.io/|${MIRROR_PREFIX}/|")
          elif echo "$IMAGE" | grep -q "^library/"; then
              MIRROR_IMAGE="${MIRROR_PREFIX}/${IMAGE}"
          elif echo "$IMAGE" | grep -q "/"; then
              if echo "$IMAGE" | grep -q "^[a-zA-Z0-9_-]*/"; then
                  MIRROR_IMAGE="${MIRROR_PREFIX}/${IMAGE}"
              else
                  MIRROR_IMAGE=$(echo "$IMAGE" | sed "s|^[^/]*/|${MIRROR_PREFIX}/|")
              fi
          else
              MIRROR_IMAGE="${MIRROR_PREFIX}/library/${IMAGE}"
          fi
          echo "MIRROR_IMAGE=$MIRROR_IMAGE" >> $GITHUB_ENV

      - name: Pull and Sync images
        if: steps.check.outputs.skip != 'true'
        env:
          CNB_REPO: docker.cnb.cool/3wlh/docker-repo/${{ env.name }}
          DOCKERHUB_REPO: ${{ env.image_name }}
          MIRROR_IMAGE: ${{ env.MIRROR_IMAGE }}
          IMAGE_TAG: ${{ env.image_tag }}
        run: |
          echo "✅ 开始同步镜像：${DOCKERHUB_REPO}:${IMAGE_TAG}"
          echo "✅ 目标仓库：${CNB_REPO}:${IMAGE_TAG}"
          echo "✅ 目标架构：${{ inputs.platform }}"

          if [ "${{ inputs.platform }}" = "all" ]; then
            echo "同步所有架构"
            docker buildx imagetools create --tag ${CNB_REPO}:${IMAGE_TAG} ${MIRROR_IMAGE}:${IMAGE_TAG}
          elif [ "${{ inputs.platform }}" = "linux/amd64,linux/arm64" ]; then
            echo "✅ 同步 amd64 和 arm64 架构"
            AMD64_DIGEST=$(docker buildx imagetools inspect ${DOCKERHUB_REPO}:${IMAGE_TAG} --raw | jq -r '.manifests[] | select(.platform.architecture=="amd64" and .platform.os=="linux") | .digest' | head -1)
            ARM64_DIGEST=$(docker buildx imagetools inspect ${DOCKERHUB_REPO}:${IMAGE_TAG} --raw | jq -r '.manifests[] | select(.platform.architecture=="arm64" and .platform.os=="linux") | .digest' | head -1)
            
            SOURCES=""
            [ -n "$AMD64_DIGEST" ] && SOURCES="${SOURCES} ${MIRROR_IMAGE}:${IMAGE_TAG}@${AMD64_DIGEST}"
            [ -n "$ARM64_DIGEST" ] && SOURCES="${SOURCES} ${MIRROR_IMAGE}:${IMAGE_TAG}@${ARM64_DIGEST}"
            
            if [ -n "$SOURCES" ]; then
              docker buildx imagetools create --tag ${CNB_REPO}:${IMAGE_TAG} $SOURCES
            else
              echo "❌ 错误：未找到 amd64 或 arm64 架构"
              exit 1
            fi
          elif [ "${{ inputs.platform }}" = "linux/amd64" ]; then
            echo "✅ 同步 amd64 架构"
            AMD64_DIGEST=$(docker buildx imagetools inspect ${DOCKERHUB_REPO}:${IMAGE_TAG} --raw | jq -r '.manifests[] | select(.platform.architecture=="amd64" and .platform.os=="linux") | .digest' | head -1)
            if [ -n "$AMD64_DIGEST" ]; then
              SOURCES="${MIRROR_IMAGE}:${IMAGE_TAG}@${AMD64_DIGEST}"
              
              TARGET_MANIFEST=$(docker buildx imagetools inspect ${CNB_REPO}:${IMAGE_TAG} --raw 2>/dev/null)
              if [ -n "$TARGET_MANIFEST" ]; then
                EXISTING_DIGESTS=$(echo "$TARGET_MANIFEST" | jq -r '.manifests[] | select(.platform.architecture!="amd64" and .platform.os=="linux") | .digest')
                for DIGEST in $EXISTING_DIGESTS; do
                  SOURCES="${SOURCES} ${CNB_REPO}:${IMAGE_TAG}@${DIGEST}"
                done
              fi
              
              docker buildx imagetools create --tag ${CNB_REPO}:${IMAGE_TAG} $SOURCES
            else
              echo "❌ 错误：未找到 amd64 架构"
              exit 1
            fi
          else
            echo "✅ 同步 arm64 架构"
            ARM64_DIGEST=$(docker buildx imagetools inspect ${DOCKERHUB_REPO}:${IMAGE_TAG} --raw | jq -r '.manifests[] | select(.platform.architecture=="arm64" and .platform.os=="linux") | .digest' | head -1)
            if [ -n "$ARM64_DIGEST" ]; then
              SOURCES="${MIRROR_IMAGE}:${IMAGE_TAG}@${ARM64_DIGEST}"
              
              TARGET_MANIFEST=$(docker buildx imagetools inspect ${CNB_REPO}:${IMAGE_TAG} --raw 2>/dev/null)
              if [ -n "$TARGET_MANIFEST" ]; then
                EXISTING_DIGESTS=$(echo "$TARGET_MANIFEST" | jq -r '.manifests[] | select(.platform.architecture!="arm64" and .platform.os=="linux") | .digest')
                for DIGEST in $EXISTING_DIGESTS; do
                  SOURCES="${SOURCES} ${CNB_REPO}:${IMAGE_TAG}@${DIGEST}"
                done
              fi
              
              docker buildx imagetools create --tag ${CNB_REPO}:${IMAGE_TAG} $SOURCES
            else
              echo "❌ 错误：未找到 arm64 架构"
              exit 1
            fi
          fi

          echo "✅ 同步完成：${{ inputs.image }}"

      - name: Docker Hub logout
        if: always()
        run: docker logout

      - name: CNB logout
        if: always()
        run: docker logout docker.cnb.cool
