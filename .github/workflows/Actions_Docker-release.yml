name: Actions Docker Release
on:
  workflow_call:
    inputs:
      platform:
        required: false
        type: string

      image:
        required: false
        type: string

env:
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build for ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(inputs.platform == 'linux/amd64,linux/arm64' && '["linux/amd64","linux/arm64"]' || inputs.platform == 'linux/amd64' && '["linux/amd64"]' || '["linux/arm64"]') }}

    steps:
      - name: Handle Variables
        run: |
          echo "name=$(echo ${{ inputs.image }} | tr 'A-Z' 'a-z')" >> $GITHUB_ENV
          echo "platform=$(echo ${{ matrix.platform }} | tr '/' '_')" >> $GITHUB_ENV

      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Buildx Build Docker image
        env:
          DOCKER_REPO: 3wlh/${{ env.name }}
        run: |
          cd ${{ inputs.image }}
          docker buildx build \
            --output "type=image" \
            --platform ${{ matrix.platform }} \
            --tag ${DOCKER_REPO}:latest \
            --file ./Dockerfile \
            --load \
            .

      - name: Docker Export images
        run: |
          test -d "/tmp/images" || mkdir -p "/tmp/images"
          image_name="3wlh/${{ env.name }}:latest"
          file="/tmp/images/${{ env.name }}-${{ env.platform }}.tar.gz"
          echo "${file} | ${image_name} "
          docker images
          docker save ${image_name} | gzip > ${file}
          ls "/tmp/images"

      - name: Upload Directory
        uses: actions/upload-artifact@main
        with:
          name: ${{ env.name }}-${{ env.platform }}
          path: /tmp/images

  upload-release:
    name: Upload Release
    needs: build
    runs-on: ubuntu-latest
    env:
      image_path: "/tmp/images"
    steps:
      - name: Delete GitHub Release
        uses: dev-drprasad/delete-tag-and-release@master
        with:
          tag_name: GitHub-Actions_${{ inputs.image }}
          delete_release: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Initial
        run: |
          sudo timedatectl set-timezone "${TZ}"
          echo "BUILD_TIME=$(date "+%Y.%m.%d_%H%M%S")" >> $GITHUB_ENV
          test -d "${{ env.image_path }}" || mkdir -p "${{ env.image_path }}"

      - name: Download Directory
        uses: actions/download-artifact@main
        with:
          path: /tmp/images
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R /tmp/images

      - name: Upload to Release
        uses: softprops/action-gh-release@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: GitHub-Actions_${{ inputs.image }}
          name: Docker_${{ inputs.image }}
          files: /tmp/images/*
          body: |
            ## 镜像信息
            - 编译时间：`${{ env.BUILD_TIME }}`
            - 架构：`${{ inputs.platform }}`
