name: Auto Build tun2socks (Android AAR Only)

on:
  workflow_dispatch:

jobs:
  build-android-aar-only:
    runs-on: ubuntu-latest
    steps:
      # 检出源码
      - name: Checkout badvpn source
        uses: actions/checkout@v4
        with:
          repository: ambrop72/badvpn
          fetch-depth: 1
          path: badvpn

      # 安装编译依赖
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            build-essential cmake ninja-build \
            gcc g++ git libssl-dev pkg-config zip

      # 安装 Android NDK r25c（稳定版）
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          ndk-path: /usr/local/lib/android/sdk/ndk/25.2.9519653
          add-to-path: true

      # 编译全架构 tun2socks（核心步骤）
      - name: Build badvpn-tun2socks for all arch
        run: |
          # 定义要编译的架构列表
          ARCH_LIST=("armeabi-v7a" "arm64-v8a" "x86" "x86_64")
          # 对应 CMake 的架构参数
          CMAKE_ARCH_MAP=(
            "armeabi-v7a:armv7-a"
            "arm64-v8a:aarch64"
            "x86:i686"
            "x86_64:x86_64"
          )
          # 输出目录
          OUTPUT_DIR="badvpn-android-build"
          mkdir -p $OUTPUT_DIR

          # 遍历编译每个架构
          for arch in "${ARCH_LIST[@]}"; do
            echo "===== 编译 $arch 架构 ====="
            # 创建临时构建目录
            BUILD_DIR="badvpn/build-$arch"
            mkdir -p $BUILD_DIR && cd $BUILD_DIR

            # 匹配 CMake 架构参数
            for map in "${CMAKE_ARCH_MAP[@]}"; do
              if [[ $map == $arch:* ]]; then
                CMAKE_ARCH=${map#*:}
                break
              fi
            done

            # CMake 配置（Android 21 兼容最低）
            cmake ../../ \
              -DCMAKE_SYSTEM_NAME=Android \
              -DCMAKE_SYSTEM_VERSION=21 \
              -DCMAKE_ANDROID_ARCH_ABI=$arch \
              -DCMAKE_ANDROID_NDK=$ANDROID_NDK_ROOT \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_NOTHING=OFF \
              -DBUILD_TUN2SOCKS=ON \
              -DCMAKE_INSTALL_PREFIX=./install

            # 编译（多核加速）
            make -j$(nproc) tun2socks

            # 复制产物到输出目录
            cp tun2socks ../../$OUTPUT_DIR/tun2socks-$arch
            cd ../..

            # 验证产物
            echo "===== 验证 $arch 产物 ====="
            file $OUTPUT_DIR/tun2socks-$arch
          done

          # 打包所有架构产物
          cd $OUTPUT_DIR
          zip -r badvpn-tun2socks-android-all.zip ./*
          cd ..

          # 输出产物信息
          echo "===== 最终产物列表 ====="
          ls -lh $OUTPUT_DIR/
        shell: /usr/bin/bash -e {0}
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_HOME }}

      # 7. 上传产物
      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: badvpn-tun2socks ${{ github.ref_name }} (Android)
          path: badvpn-android-build/*.zip

      # 8. 清理
      - name: Clean up
        if: always()
        run: |
          cd tun2socks
          make clean
          go clean -modcache