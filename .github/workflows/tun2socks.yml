name: Auto Build tun2socks (Android AAR Only)

on:
  workflow_dispatch:

jobs:
  build-android-aar-only:
    runs-on: ubuntu-latest
    steps:
      # 检出源码
      - name: Checkout badvpn source
        uses: actions/checkout@v4
        with:
          repository: ambrop72/badvpn
          fetch-depth: 1
          path: badvpn

      # 安装 Android NDK r25c（稳定版）
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          ndk-path: /usr/local/lib/android/sdk/ndk/25
          add-to-path: true

      # 安装编译依赖
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            build-essential cmake ninja-build \
            gcc g++ git libssl-dev pkg-config zip \
            libnspr4-dev libnl-3-dev libnl-genl-3-dev  # badvpn 必需依赖
          # 验证 NSPR 安装
          pkg-config --modversion nspr


      # 编译全架构 tun2socks（核心步骤）
      - name: Build badvpn-tun2socks for all arch
        run: |
          ARCH_LIST=("armeabi-v7a" "arm64-v8a" "x86" "x86_64")
          OUTPUT_DIR="./badvpn-android-build"
          mkdir -p $OUTPUT_DIR
          cd ./badvpn

          # 强制指定 NDK r25c 路径（避免用 27）
          export ANDROID_NDK_ROOT=/usr/local/lib/android/sdk/ndk/25

          for arch in "${ARCH_LIST[@]}"; do
            echo "===== 编译 $arch 架构 ====="
            BUILD_DIR="./build-$arch"
            mkdir -p $BUILD_DIR && cd $BUILD_DIR

            # CMake 配置：添加策略参数解决版本提示 + 固定 NDK
            cmake ../ \
              -DCMAKE_SYSTEM_NAME=Android \
              -DCMAKE_SYSTEM_VERSION=21 \
              -DCMAKE_ANDROID_ARCH_ABI=$arch \
              -DCMAKE_ANDROID_NDK=$ANDROID_NDK_ROOT \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_NOTHING=OFF \
              -DBUILD_TUN2SOCKS=ON \
              -DCMAKE_INSTALL_PREFIX=./install \
              # 解决 CMake 版本策略提示
              -DCMAKE_POLICY_DEFAULT_CMP0048=NEW \
              -DCMAKE_POLICY_DEFAULT_CMP0065=NEW

            # 编译 tun2socks（只编译核心目标，加快速度）
            make -j$(nproc) tun2socks

            # 复制产物
            cp tun2socks $OUTPUT_DIR/tun2socks-$arch
            cd ../
          done

          # 打包产物
          cd ../
          zip -r $OUTPUT_DIR/badvpn-tun2socks-android-all.zip $OUTPUT_DIR/tun2socks-*
          ls -lh $OUTPUT_DIR/
        shell: /usr/bin/bash -e {0}

      # 上传产物
      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: badvpn-tun2socks ${{ github.ref_name }} (Android)
          path: badvpn-android-build/*.zip

      # 清理产物（可选）
      - name: Clean up
        if: always()
        run: |
          rm -rf badvpn/build-*
          rm -rf badvpn-android-build