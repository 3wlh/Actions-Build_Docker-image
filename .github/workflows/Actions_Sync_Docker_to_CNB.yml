name: Sync Docker to CNB

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      image:
        description: 选择要同步的镜像
        required: true
        type: choice
        options:
          - 3wlh/photopea
          - alpine
          - alpine:3.18

      platform:
        description: 选择要同步的目标架构
        required: true
        default: "all"
        type: choice
        options:
          - all
          - linux/amd64,linux/arm64
          - linux/amd64
          - linux/arm64

env:
  TZ: Asia/Shanghai

jobs:
  sync:
    name: Sync to CNB
    runs-on: ubuntu-latest
    steps:
      - name: Handle Variables
        run: |
          INPUT="${{ inputs.image }}"
          if [[ "$INPUT" == *":"* ]]; then
            IMAGE_NAME="${INPUT%%:*}"
            IMAGE_TAG="${INPUT##*:}"
          else
            IMAGE_NAME="$INPUT"
            IMAGE_TAG="latest"
          fi
          echo "name=$(basename $IMAGE_NAME | tr 'A-Z' 'a-z')" >> $GITHUB_ENV
          echo "image_name=$IMAGE_NAME" >> $GITHUB_ENV
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to CNB
        run: |
          docker login -u cnb -p ${{ secrets.CNB_TOKEN }} docker.cnb.cool

      - name: Check if sync needed
        id: check
        env:
          CNB_REPO: docker.cnb.cool/3wlh/docker-repo/${{ env.name }}
          DOCKERHUB_REPO: ${{ env.image_name }}
          IMAGE_TAG: ${{ env.image_tag }}
        run: |
          echo "检查镜像是否需要同步..."

          SOURCE_DIGEST=$(docker buildx imagetools inspect ${DOCKERHUB_REPO}:${IMAGE_TAG} --raw 2>/dev/null | jq -r '.manifests[0].digest // .manifests[0].config.digest // empty' | head -1)
          if [ -z "$SOURCE_DIGEST" ]; then
            SOURCE_DIGEST=$(docker buildx imagetools inspect ${DOCKERHUB_REPO}:${IMAGE_TAG} --raw 2>/dev/null | sha256sum | cut -d' ' -f1)
            SOURCE_DIGEST="sha256:$SOURCE_DIGEST"
          fi
          echo "源镜像 digest: ${SOURCE_DIGEST}"

          TARGET_DIGEST=$(docker buildx imagetools inspect ${CNB_REPO}:${IMAGE_TAG} --raw 2>/dev/null | jq -r '.manifests[0].digest // .manifests[0].config.digest // empty' | head -1)
          if [ -z "$TARGET_DIGEST" ]; then
            TARGET_DIGEST=$(docker buildx imagetools inspect ${CNB_REPO}:${IMAGE_TAG} --raw 2>/dev/null | sha256sum | cut -d' ' -f1)
            [ -n "$TARGET_DIGEST" ] && TARGET_DIGEST="sha256:$TARGET_DIGEST"
          fi
          echo "目标镜像 digest: ${TARGET_DIGEST:-不存在}"

          if [ "$SOURCE_DIGEST" = "$TARGET_DIGEST" ]; then
            echo "镜像已存在且相同，跳过同步"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "需要同步镜像"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Pull and Sync images
        if: steps.check.outputs.skip != 'true'
        env:
          CNB_REPO: docker.cnb.cool/3wlh/docker-repo/${{ env.name }}
          DOCKERHUB_REPO: ${{ env.image_name }}
          IMAGE_TAG: ${{ env.image_tag }}
        run: |
          echo "开始同步镜像：${DOCKERHUB_REPO}:${IMAGE_TAG}"
          echo "目标仓库：${CNB_REPO}:${IMAGE_TAG}"
          echo "目标架构：${{ inputs.platform }}"

          if [ "${{ inputs.platform }}" = "all" ]; then
            echo "同步所有架构"
            docker buildx imagetools create --tag ${CNB_REPO}:${IMAGE_TAG} ${DOCKERHUB_REPO}:${IMAGE_TAG}
          elif [ "${{ inputs.platform }}" = "linux/amd64,linux/arm64" ]; then
            echo "同步 amd64 和 arm64 架构"
            docker buildx imagetools create --tag ${CNB_REPO}:${IMAGE_TAG} \
              ${DOCKERHUB_REPO}:${IMAGE_TAG}@$(docker buildx imagetools inspect ${DOCKERHUB_REPO}:${IMAGE_TAG} --raw | jq -r '.manifests[] | select(.platform.architecture=="amd64" and .platform.os=="linux") | .digest' | head -1) \
              ${DOCKERHUB_REPO}:${IMAGE_TAG}@$(docker buildx imagetools inspect ${DOCKERHUB_REPO}:${IMAGE_TAG} --raw | jq -r '.manifests[] | select(.platform.architecture=="arm64" and .platform.os=="linux") | .digest' | head -1)
          elif [ "${{ inputs.platform }}" = "linux/amd64" ]; then
            echo "同步 amd64 架构"
            docker buildx imagetools create --tag ${CNB_REPO}:${IMAGE_TAG} \
              ${DOCKERHUB_REPO}:${IMAGE_TAG}@$(docker buildx imagetools inspect ${DOCKERHUB_REPO}:${IMAGE_TAG} --raw | jq -r '.manifests[] | select(.platform.architecture=="amd64" and .platform.os=="linux") | .digest' | head -1)
          else
            echo "同步 arm64 架构"
            docker buildx imagetools create --tag ${CNB_REPO}:${IMAGE_TAG} \
              ${DOCKERHUB_REPO}:${IMAGE_TAG}@$(docker buildx imagetools inspect ${DOCKERHUB_REPO}:${IMAGE_TAG} --raw | jq -r '.manifests[] | select(.platform.architecture=="arm64" and .platform.os=="linux") | .digest' | head -1)
          fi

          echo "同步完成：${{ inputs.image }}"

      - name: Docker Hub logout
        if: always()
        run: docker logout

      - name: CNB logout
        if: always()
        run: docker logout docker.cnb.cool
