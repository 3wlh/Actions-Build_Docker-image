name: Auto Build tun2socks (All Platforms)

on:
  workflow_dispatch:

jobs:
  build-all-platforms:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码（替换为你的仓库地址）
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          repository: xjasonlyu/tun2socks  # 若你是 fork 仓库，改为你的仓库
          fetch-depth: 1

      # 2. 安装 Go（匹配 tun2socks 要求的版本）
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'  # 推荐 1.21+，兼容 gVisor
          cache: true

      # 3. 安装 Android NDK（r25c，兼容最好）
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      # 4. 安装 AAR 编译依赖（JDK + 基础工具）
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y make zip build-essential openjdk-17-jdk
          # 设置 JAVA_HOME（必须）
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV

      # 5. 核心：执行 Makefile 编译所有架构（含 Android）
      - name: Build all platforms (include Android)
        run: |
          export ANDROID_NDK_ROOT=${ANDROID_NDK_HOME:-/usr/local/lib/android/sdk/ndk/25.2.9519653}
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          curl -sSfL https://raw.githubusercontent.com/3wlh/Actions-Docker/refs/heads/main/tun2socks/Makefile > Makefile
          # 设置 NDK 环境变量
          export ANDROID_NDK_ROOT=${ANDROID_NDK_HOME}
          # 编译所有架构（桌面 + Android）
          make all
          # 列出产物，验证编译结果
          ls -lh build/
          file build/tun2socks.aar  # 验证 AAR 文件格式

      # 6. 上传 AAR 产物（可手动下载）
      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: tun2socks-android-aar
          path: build/*.zip  # 上传打包后的 AAR zip

      # 7. 打标签时自动发布到 GitHub Release
      - name: Publish AAR to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.zip
          name: AAR Release ${{ github.ref_name }}
          body: |
            📱 tun2socks Android AAR 库（仅 AAR）
            - 兼容版本：Android 5.0+ (API 21)
            - NDK 版本：r25c
            - Go 版本：1.21
            - JDK 版本：17
            - 提交哈希：${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 8. 可选：清理构建产物（节省空间）
      - name: Clean up
        if: always()
        run: make clean